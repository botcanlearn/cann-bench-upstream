operator:
  name: CrossformerAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax(Q @ K^T / sqrt(D) + optional position_bias) @ V
  description: Computes attention over Crossformer windows with an explicit position-bias tensor.
  shape_support: q/k/v [B, H, N, D], optional position_bias [H, N, N].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, N, D], optional position_bias [H, N, N].
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, N, D], optional position_bias [H, N, N].
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, N, D], optional position_bias [H, N, N].
  - name: position_bias
    description: position_bias input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, N, D], optional position_bias [H, N, N].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: crossformer_attention(Tensor q, Tensor k, Tensor v, Tensor position_bias)
    -> Tensor output
