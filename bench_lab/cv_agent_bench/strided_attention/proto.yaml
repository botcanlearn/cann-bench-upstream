operator:
  name: StridedAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) masked by strided positions) @ V
  description: Restricts attention to stride-selected key positions for each query row.
  shape_support: q/k/v [B, H, S, D] with stride mask.
  attrs:
  - name: stride
    type: int
    default: 4
    description: stride operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with stride mask.
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with stride mask.
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with stride mask.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: strided_attention(Tensor q, Tensor k, Tensor v, int stride=4) -> Tensor
    output
