operator:
  name: BigbirdAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) masked by local + global + random BigBird
    mask) @ V
  description: Applies BigBird-style local, global, and random sparse masking before attention.
  shape_support: q/k/v [B, H, S, D], mask [S, S] broadcast over batch and heads.
  attrs:
  - name: window_size
    type: int
    default: 32
    description: window_size operator attribute
    required: false
  - name: num_random_blocks
    type: int
    default: 3
    description: num_random_blocks operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float32
    shape: q/k/v [B, H, S, D], mask [S, S] broadcast over batch and heads.
  - name: k
    description: k input tensor
    dtype:
    - float32
    shape: q/k/v [B, H, S, D], mask [S, S] broadcast over batch and heads.
  - name: v
    description: v input tensor
    dtype:
    - float32
    shape: q/k/v [B, H, S, D], mask [S, S] broadcast over batch and heads.
  - name: mask
    description: mask input tensor
    dtype:
    - uint8
    shape: q/k/v [B, H, S, D], mask [S, S] broadcast over batch and heads.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float32
    shape: defined by the reference forward result
  schema: bigbird_attention(Tensor q, Tensor k, Tensor v, Tensor mask, int window_size=32,
    int num_random_blocks=3) -> Tensor output
