operator:
  name: AftFull
  category: FusedComposite
  difficulty: L4
  formula: Y = sigmoid(Q) * sum(exp(K + position_bias) * V) / sum(exp(K + position_bias))
  description: Computes AFT-full attention with sigmoid query gating and learned-style positional bias.
  shape_support: q/k/v [B, S, D].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float32
    shape: q/k/v [B, S, D].
  - name: k
    description: k input tensor
    dtype:
    - float32
    shape: q/k/v [B, S, D].
  - name: v
    description: v input tensor
    dtype:
    - float32
    shape: q/k/v [B, S, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float32
    shape: defined by the reference forward result
  schema: aft_full(Tensor q, Tensor k, Tensor v) -> Tensor output
