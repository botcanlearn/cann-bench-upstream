operator:
  name: MultiQueryAttention
  category: FusedComposite
  difficulty: L4
  formula: Repeat single KV head over query heads, then compute scaled dot-product
    attention.
  description: Broadcasts a single KV head across all query heads for multi-query attention.
  shape_support: q [B, Hq, S, D], k/v [B, 1, S, D].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, 1, S, D].
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, 1, S, D].
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, 1, S, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: multi_query_attention(Tensor q, Tensor k, Tensor v) -> Tensor output
