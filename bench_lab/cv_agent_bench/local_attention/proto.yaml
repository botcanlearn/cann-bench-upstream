operator:
  name: LocalAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) masked by a sliding local window) @ V
  description: Restricts scaled dot-product attention to a sliding local sequence window.
  shape_support: q/k/v [B, H, S, D] with local sliding window.
  attrs:
  - name: window_size
    type: int
    default: 32
    description: window_size operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with local sliding window.
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with local sliding window.
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D] with local sliding window.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: local_attention(Tensor q, Tensor k, Tensor v, int window_size=32) -> Tensor
    output
