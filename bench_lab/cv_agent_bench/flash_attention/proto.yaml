operator:
  name: FlashAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax(Q @ K^T / sqrt(D)) @ V
  description: Computes unmasked scaled dot-product attention for separate query and KV lengths.
  shape_support: q [B, H, Sq, D], k/v [B, H, Skv, D].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D].
  - name: k
    description: k input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D].
  - name: v
    description: v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention(Tensor q, Tensor k, Tensor v) -> Tensor output
