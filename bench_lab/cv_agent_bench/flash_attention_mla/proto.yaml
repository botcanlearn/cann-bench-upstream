operator:
  name: FlashAttentionMla
  category: FusedComposite
  difficulty: L4
  formula: Concatenate nope/rope score components, repeat KV heads as needed, then
    compute scaled dot-product attention.
  description: Combines rope and non-rope score components for MLA-style grouped attention.
  shape_support: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*],
    Hq % Hkv == 0.
  attrs: []
  inputs:
  - name: q_nope
    description: q_nope input tensor
    dtype:
    - bfloat16
    - float16
    shape: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*], Hq %
      Hkv == 0.
  - name: q_rope
    description: q_rope input tensor
    dtype:
    - bfloat16
    - float16
    shape: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*], Hq %
      Hkv == 0.
  - name: k_nope
    description: k_nope input tensor
    dtype:
    - bfloat16
    - float16
    shape: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*], Hq %
      Hkv == 0.
  - name: k_rope
    description: k_rope input tensor
    dtype:
    - bfloat16
    - float16
    shape: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*], Hq %
      Hkv == 0.
  - name: v
    description: v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q_nope/q_rope [B, Hq, Sq, D*], k_nope/k_rope/v [B, Hkv, Skv, D*], Hq %
      Hkv == 0.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_mla(Tensor q_nope, Tensor q_rope, Tensor k_nope, Tensor
    k_rope, Tensor v) -> Tensor output
