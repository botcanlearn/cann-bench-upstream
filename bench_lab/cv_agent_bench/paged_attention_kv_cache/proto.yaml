operator:
  name: PagedAttentionKvCache
  category: FusedComposite
  difficulty: L4
  formula: Reconstruct paged K/V cache through page_table and compute cache attention.
  description: Reconstructs paged GQA K/V cache sequences and applies optional causal masking.
  shape_support: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B,
    MaxBlocks].
  attrs:
  - name: causal
    type: bool
    default: true
    description: causal operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B, MaxBlocks].
  - name: k_cache
    description: k_cache input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B, MaxBlocks].
  - name: v_cache
    description: v_cache input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B, MaxBlocks].
  - name: cache_seqlens
    description: cache_seqlens input tensor
    dtype:
    - int32
    shape: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B, MaxBlocks].
  - name: page_table
    description: page_table input tensor
    dtype:
    - int32
    shape: q [B, Sq, Hq, D], k/v cache [Blocks, Page, Hkv, D], page_table [B, MaxBlocks].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: paged_attention_kv_cache(Tensor q, Tensor k_cache, Tensor v_cache, Tensor
    cache_seqlens, Tensor page_table, bool causal=True) -> Tensor output
