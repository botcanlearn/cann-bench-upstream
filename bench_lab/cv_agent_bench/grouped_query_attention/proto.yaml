operator:
  name: GroupedQueryAttention
  category: FusedComposite
  difficulty: L4
  formula: K_rep = repeat_interleave(K, Hq / Hkv); V_rep = repeat_interleave(V, Hq
    / Hkv); Y = softmax(Q @ K_rep^T / sqrt(D)) @ V_rep
  description: Repeats grouped KV heads and computes standard grouped-query attention.
  shape_support: q [B, Hq, S, D], k/v [B, Hkv, S, D], Hq % Hkv == 0.
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, Hkv, S, D], Hq % Hkv == 0.
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, Hkv, S, D], Hq % Hkv == 0.
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q [B, Hq, S, D], k/v [B, Hkv, S, D], Hq % Hkv == 0.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: grouped_query_attention(Tensor q, Tensor k, Tensor v) -> Tensor output
