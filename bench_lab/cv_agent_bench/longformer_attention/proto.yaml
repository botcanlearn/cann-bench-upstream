operator:
  name: LongformerAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) masked by local window plus global indices
    [0, 511]) @ V
  description: Combines local-window attention with fixed global token positions.
  shape_support: q/k/v [B, H, S, D], S >= 512 to match reference global indices [0,
    511].
  attrs:
  - name: window_size
    type: int
    default: 32
    description: window_size operator attribute
    required: false
  inputs:
  - name: Q
    description: Q input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S >= 512 to match reference global indices [0, 511].
  - name: K
    description: K input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S >= 512 to match reference global indices [0, 511].
  - name: V
    description: V input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S >= 512 to match reference global indices [0, 511].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: longformer_attention(Tensor Q, Tensor K, Tensor V, int window_size=32) ->
    Tensor output
