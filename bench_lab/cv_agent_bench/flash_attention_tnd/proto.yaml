operator:
  name: FlashAttentionTnd
  category: FusedComposite
  difficulty: L4
  formula: Split packed TND inputs by actual length prefixes and compute attention
    per segment.
  description: Splits packed TND tensors by cumulative lengths and computes attention per segment.
  shape_support: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length
    tensors [B].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length tensors
      [B].
  - name: k
    description: k input tensor
    dtype:
    - bfloat16
    - float16
    shape: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length tensors
      [B].
  - name: v
    description: v input tensor
    dtype:
    - bfloat16
    - float16
    shape: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length tensors
      [B].
  - name: actual_q_len
    description: actual_q_len input tensor
    dtype:
    - int64
    shape: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length tensors
      [B].
  - name: actual_kv_len
    description: actual_kv_len input tensor
    dtype:
    - int64
    shape: packed q [sum(Sq_i), H, D], k/v [sum(Skv_i), H, D], prefix length tensors
      [B].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_tnd(Tensor q, Tensor k, Tensor v, Tensor actual_q_len, Tensor
    actual_kv_len) -> Tensor output
