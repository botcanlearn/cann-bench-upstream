operator:
  name: AttentionUpdate
  category: Attention
  difficulty: L2
  formula: attention_update(...) -> (Tensor out, Tensor lse_out)
  description: 将各SP域PA/IFA算子的局部lse和localOut更新为全局结果
  shape_support: 输入ND格式
  attrs:
  - name: update_type
    type: int64
    default: 0
    description: '控制lseOut是否输出，0=不输出lseOut，1=输出lseOut'
    required: true
  inputs:
  - name: lse
    description: 各SP域的局部lse（TensorList，每个tensor shape为[bsh]）
    dtype:
    - float32
    is_list: true
  - name: local_out
    description: 各SP域的局部attention output（TensorList，每个tensor shape为[bsh, headDim]）
    dtype:
    - float16
    - bfloat16
    is_list: true
  outputs:
  - name: out
    description: 更新后的全局attention output
    dtype:
    - float16
    - bfloat16
  - name: lse_out
    description: 更新后的全局lse（update_type=0时为空tensor）
    dtype:
    - float32
  schema: attention_update(Tensor[] lse, Tensor[] local_out, int64 update_type=0) -> (Tensor out, Tensor lse_out)
