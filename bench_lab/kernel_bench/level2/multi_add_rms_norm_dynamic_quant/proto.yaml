operator:
  name: MultiAddRmsNormDynamicQuant
  category: Normalization
  difficulty: L2
  formula: "x = sum(x1) + x2; y = RmsNorm(x, gamma, eps); y1, scale1 = DynamicQuant(y, smooth1); y2, scale2 = DynamicQuant(y, smooth2)"
  description: "融合Add+RmsNorm+DynamicQuant算子。x1为1~5个tensor的列表，smooth_scale1/smooth_scale2为可选输入。"
  shape_support: "输入ND格式，支持2D及以上维度。输入tensor顺序：[x1, ...] + x2 + gamma + [smooth_scale1] + [smooth_scale2]。"
  # int8 动态量化输出存在 NPU/CPU 浮点累加序差异，允许 ±1 绝对误差
  precision_thresholds:
    int8: 1.0
  attrs:
  - name: epsilon
    type: float
    default: 1e-6
    description: "防止除0的小常数"
    required: false
  inputs:
  - name: x1
    description: "待相加的源数据张量列表，长度为1~5，每个张量shape与x2相同"
    dtype: [float16, bfloat16]
  - name: x2
    description: "x2张量(必需)，shape同x1中每个张量"
    dtype: [float16, bfloat16]
  - name: gamma
    description: "gamma张量(必需)，shape为[D]"
    dtype: [float16, bfloat16]
  - name: smooth_scale1
    description: "可选：smooth_scale1"
    dtype: [float16, bfloat16]
  - name: smooth_scale2
    description: "可选：smooth_scale2"
    dtype: [float16, bfloat16]
  outputs:
  - name: y1
    description: "第一路量化输出"
    dtype: [int8]
  - name: y2
    description: "第二路量化输出，smooth2不存在时无意义"
    dtype: [int8]
    compare: false
  - name: x
    description: "sum(x1)+x2的和"
    dtype: [float16, bfloat16]
  - name: y
    description: "RmsNorm归一化结果"
    dtype: [float16, bfloat16]
  - name: scale1
    description: "第一路量化scale"
    dtype: [float32]
  - name: scale2
    description: "第二路量化scale，smooth2不存在时无意义"
    dtype: [float32]
    compare: false
  schema: "multi_add_rms_norm_dynamic_quant(Tensor[] x1, Tensor x2, Tensor gamma, Tensor? smooth_scale1=None, Tensor? smooth_scale2=None, float epsilon=1e-6) -> (Tensor, Tensor, Tensor, Tensor, Tensor, Tensor)"
