operator:
  name: AiInfraAggregateHiddenGrad
  category: Convolution
  difficulty: L2
  formula: |
    grad_input[t,b,d] = grad_output[t,b,d] * weight[2,d]
                      + grad_output[t+1,b,d] * weight[1,d]
                      + grad_output[t+2,b,d] * weight[0,d]
    grad_weight[k,d] = sum_{t,b} grad_output[t+k,b,d] * input[t,b,d]
  description: 对 AggregateHidden 算子进行一维分组因果卷积的反向梯度计算，卷积窗口固定为3
  shape_support: 输入ND格式
  attrs: []
  inputs:
  - name: grad_output
    description: 反向梯度输入，shape为[S, B, H]
    dtype:
    - float16
    - bfloat16
  - name: input
    description: 前向输入，shape为[S, B, H]
    dtype:
    - float16
    - bfloat16
  - name: weight
    description: 卷积权重，shape为[W, H]，W固定为3
    dtype:
    - float16
    - bfloat16
  - name: mask
    description: 可选掩码，shape为[B, S]，默认None
    dtype:
    - bool
  outputs:
  - name: grad_input
    description: 输入梯度，shape与grad_output一致[S, B, H]
    dtype:
    - float16
    - bfloat16
  - name: grad_weight
    description: 权重梯度，shape与weight一致[W, H]
    dtype:
    - float16
    - bfloat16
  schema: ai_infra_aggregate_hidden_grad(Tensor grad_output, Tensor input, Tensor weight, Tensor? mask=None) -> (Tensor grad_input, Tensor grad_weight)