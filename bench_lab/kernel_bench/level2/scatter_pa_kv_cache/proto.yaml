operator:
  name: ScatterPaKvCache
  category: Attention
  difficulty: L2
  formula: scatter_pa_kv_cache(key, key_cache, slot_mapping, value, value_cache, cache_mode="PA_NZ") -> (key_cache, value_cache)
  description: ScatterPaKvCache算子，将输入的key/value token写入PagedAttention KV Cache中，当前测试集仅支持PA_NZ(FRACTAL_NZ)格式
  shape_support: 输入PA_NZ(FRACTAL_NZ)格式
  attrs:
  - name: cache_mode
    type: string
    default: "PA_NZ"
    description: 'cache格式模式，仅支持PA_NZ'
    required: false
  inputs:
  - name: key
    description: 输入key张量，shape为[numTokens, numHeads, headSize]
    dtype:
    - float16
    - bfloat16
    - int8
  - name: key_cache
    description: key cache张量(NZ格式)，shape为[numBlocks, numHeads*headSize/lastDim, blockSize, lastDim]
    dtype:
    - float16
    - bfloat16
    - int8
  - name: slot_mapping
    description: slot索引张量，shape为[numTokens]，值为token写入cache的位置索引
    dtype:
    - int32
    - int64
  - name: value
    description: 输入value张量，shape为[numTokens, numHeads, vHeadSize]
    dtype:
    - float16
    - bfloat16
    - int8
  - name: value_cache
    description: value cache张量(NZ格式)，shape为[numBlocks, numHeads*vHeadSize/lastDim, blockSize, lastDim]
    dtype:
    - float16
    - bfloat16
    - int8
  outputs:
  - name: key_cache
    description: 更新后的key cache张量
    dtype:
    - float16
    - bfloat16
    - int8
  - name: value_cache
    description: 更新后的value cache张量
    dtype:
    - float16
    - bfloat16
    - int8
  schema: scatter_pa_kv_cache(Tensor key, Tensor key_cache, Tensor slot_mapping, Tensor value, Tensor value_cache, string cache_mode="PA_NZ") -> (Tensor key_cache, Tensor value_cache)
