operator:
  name: AiInfraManifoldConstrainedHyperConnectionPostGrad
  category: Attention
  difficulty: L2
  formula: ai_infra_manifold_constrained_hyper_connection_post_grad(...) -> (Tensor grad_x, Tensor grad_h_res, Tensor grad_h_out, Tensor grad_h_post)
  description: ManifoldConstrainedHyperConnectionPost的反向梯度算子，计算grad_output对x/h_res/h_out/h_post的梯度
  shape_support: 输入ND格式
  inputs:
  - name: grad_output
    description: 上游梯度, [..., S, n, D]
    dtype:
    - float16
    - bfloat16
  - name: x
    description: 前向输入x, [..., S, n, D]
    dtype:
    - float16
    - bfloat16
  - name: h_res
    description: 前向残差权重, [..., S, n, n]
    dtype:
    - float32
  - name: h_out
    description: 前向输出权重, [..., S, D]
    dtype:
    - float16
    - bfloat16
  - name: h_post
    description: 前向后处理权重, [..., S, n]
    dtype:
    - float32
  outputs:
  - name: grad_x
    description: x的梯度, [..., S, n, D]
    dtype:
    - float16
    - bfloat16
  - name: grad_h_res
    description: h_res的梯度, [..., S, n, n]
    dtype:
    - float32
  - name: grad_h_out
    description: h_out的梯度, [..., S, D]
    dtype:
    - float16
    - bfloat16
  - name: grad_h_post
    description: h_post的梯度, [..., S, n]
    dtype:
    - float32
  schema: ai_infra_manifold_constrained_hyper_connection_post_grad(Tensor grad_output, Tensor x, Tensor h_res, Tensor h_out, Tensor h_post) -> (Tensor grad_x, Tensor grad_h_res, Tensor grad_h_out, Tensor grad_h_post)