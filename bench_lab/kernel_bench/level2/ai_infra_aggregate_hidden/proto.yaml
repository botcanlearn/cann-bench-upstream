operator:
  name: AiInfraAggregateHidden
  category: Convolution
  difficulty: L2
  formula: "output[i,j] = mask[j,i] * sum(k=0..W-1) input[i-k,j] * weight[W-1-k]"
  description: 对hidden层的token进行一维分组因果卷积，卷积窗口固定为3
  shape_support: 输入ND格式
  inputs:
  - name: input
    description: 待计算数据，shape为[S, B, H]
    dtype:
    - bfloat16
    - float16
  - name: weight
    description: 卷积权重，shape为[W, H]，W固定为3
    dtype:
    - bfloat16
    - float16
  - name: mask
    description: 可选掩码，shape为[B, S]，默认None
    dtype:
    - bool
  outputs:
  - name: output
    description: 卷积输出，shape与input一致[S, B, H]
    dtype:
    - bfloat16
    - float16
  schema: ai_infra_aggregate_hidden(Tensor input, Tensor weight, Tensor? mask=None) -> Tensor output
