operator:
  name: AdvanceStepV2
  category: IndexGather
  difficulty: L2
  formula: advance_step_v2(...) -> (Tensor input_tokens, Tensor input_positions, Tensor seq_lens, Tensor slot_mapping)
  description: vLLM AdvanceStepV2算子，用于在每个生成步骤中更新inputTokens、inputPositions、seqLens和slotMapping。
  shape_support: 输入ND格式
  attrs:
  - name: num_seqs
    type: int64
    description: '记录输入的seq数量，大小与seqLens的长度一致。取值范围是大于0的正整数。numSeqs的值大于输入numQueries的值。'
    required: true
  - name: num_queries
    type: int64
    description: '记录输入的Query的数量，大小与sampledTokenIds第一维的长度一致。取值范围是大于0的正整数。'
    required: true
  - name: block_size
    type: int64
    description: '每个block的大小。取值范围是大于0的正整数。'
    required: true
  inputs:
  - name: input_tokens
    description: 输入/输出张量input_tokens
    dtype:
    - int64
  - name: sampled_token_ids
    description: 输入张量sampled_token_ids
    dtype:
    - int64
  - name: input_positions
    description: 输入/输出张量input_positions
    dtype:
    - int64
  - name: seq_lens
    description: 输入/输出张量seq_lens
    dtype:
    - int64
  - name: slot_mapping
    description: 输入/输出张量slot_mapping
    dtype:
    - int64
  - name: block_tables
    description: 输入张量block_tables
    dtype:
    - int64
  - name: spec_token
    description: 输入张量spec_token
    dtype:
    - int64
  - name: accepted_num
    description: 输入张量accepted_num
    dtype:
    - int64
  outputs:
  - name: input_tokens
    description: 更新后的输入/输出张量input_tokens
    dtype:
    - int64
  - name: input_positions
    description: 更新后的输入/输出张量input_positions
    dtype:
    - int64
  - name: seq_lens
    description: 更新后的输入/输出张量seq_lens
    dtype:
    - int64
  - name: slot_mapping
    description: 更新后的输入/输出张量slot_mapping
    dtype:
    - int64
  schema: advance_step_v2(Tensor input_tokens, Tensor sampled_token_ids, Tensor input_positions, Tensor seq_lens, Tensor slot_mapping, Tensor block_tables, Tensor spec_token, Tensor accepted_num, int64 num_seqs, int64 num_queries, int64 block_size) -> (Tensor input_tokens, Tensor input_positions, Tensor seq_lens, Tensor slot_mapping)
