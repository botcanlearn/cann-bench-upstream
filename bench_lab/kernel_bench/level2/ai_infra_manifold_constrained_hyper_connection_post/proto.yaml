operator:
  name: AiInfraManifoldConstrainedHyperConnectionPost
  category: Attention
  difficulty: L2
  formula: ai_infra_manifold_constrained_hyper_connection_post(...) -> Tensor output
  description: ManifoldConstrainedHyperConnection后处理算子，合并h_post加权h_out与h_res加权x得到最终输出
  shape_support: 输入ND格式
  inputs:
  - name: x
    description: 输入张量x, [..., S, n, D]
    dtype:
    - float16
    - bfloat16
  - name: h_res
    description: 残差权重, [..., S, n, n]
    dtype:
    - float32
  - name: h_out
    description: 输出权重, [..., S, D]
    dtype:
    - float16
    - bfloat16
  - name: h_post
    description: 后处理权重, [..., S, n]
    dtype:
    - float32
  outputs:
  - name: output
    description: 输出张量, [..., S, n, D]
    dtype:
    - float16
    - bfloat16
  schema: ai_infra_manifold_constrained_hyper_connection_post(Tensor x, Tensor h_res, Tensor h_out, Tensor h_post) -> Tensor output