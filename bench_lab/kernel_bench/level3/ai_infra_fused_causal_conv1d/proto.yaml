operator:
  name: AiInfraFusedCausalConv1d
  category: Convolution
  difficulty: L3
  formula: ai_infra_fused_causal_conv1d(...) -> (Tensor y, Tensor conv_states)
  description: AiInfraFusedCausalConv1d 融合因果一维卷积算子，支持变长序列、APC 缓存、残差连接与可选 silu/swish 激活。
  shape_support: 输入 ND 格式；x 支持 2D (cu_seq_len, dim) 或 3D (batch, seq_len, dim)
  attrs:
  - name: pad_slot_id
    type: int64
    default: -1
    description: 无效 slot ID，对应 batch 将被跳过
    required: false
  - name: max_query_len
    type: int64
    default: -1
    description: 最大序列长度，-1 表示自动推导
    required: false
  - name: residual_connection
    type: int64
    default: 1
    description: 是否添加残差连接，0=否，1=是
    required: false
  - name: block_size
    type: int64
    default: 128
    description: APC block 大小
    required: false
  - name: conv_mode
    type: int64
    default: 1
    description: 卷积模式，0=标准，1=Pangu v2（首 token 补零）
    required: false
  - name: inplace
    type: bool
    default: false
    description: 是否原地更新 x
    required: false
  - name: activation
    type: string
    default: "none"
    description: 激活函数，可选 none/silu/swish
    required: false
  - name: run_mode
    type: int64
    default: 0
    description: 运行模式，0=连续 prefill，1=变长 prefill（golden 仅用于对齐参数）
    required: false
  inputs:
  - name: x
    description: 输入张量，shape=(cu_seq_len, dim) 或 (batch, seq_len, dim)
    dtype:
    - bfloat16
    - float16
  - name: weight
    description: 卷积核，shape=(width, dim)
    dtype:
    - bfloat16
    - float16
  - name: conv_states
    description: KV 状态缓存，shape=(num_slots, state_len, dim)
    dtype:
    - bfloat16
    - float16
  - name: query_start_loc
    description: 各 batch 起始 token 位置，shape=(batch+1,)
    dtype:
    - int32
  - name: cache_indices
    description: cache slot 索引，shape=(batch,) 或 (batch, max_blocks)
    dtype:
    - int32
  - name: num_accepted_tokens
    description: 投机解码每 batch 接受 token 数，shape=(batch,)
    dtype:
    - int32
  - name: num_computed_tokens
    description: 已计算 token 数，shape=(batch,)
    dtype:
    - int32
  - name: block_idx_first_scheduled_token
    description: APC 第一个调度 block 索引，shape=(batch,)
    dtype:
    - int32
  - name: block_idx_last_scheduled_token
    description: APC 最后一个调度 block 索引，shape=(batch,)
    dtype:
    - int32
  - name: initial_state_idx
    description: APC 初始 state 读取索引，shape=(batch,)
    dtype:
    - int32
  outputs:
  - name: y
    description: 卷积输出，shape 与 x 相同
    dtype:
    - bfloat16
    - float16
  - name: conv_states
    description: 更新后的 KV 状态缓存
    dtype:
    - bfloat16
    - float16
  schema: ai_infra_fused_causal_conv1d(Tensor x, Tensor weight, Tensor conv_states, Tensor query_start_loc, Tensor cache_indices, Tensor num_accepted_tokens, Tensor num_computed_tokens, Tensor block_idx_first_scheduled_token, Tensor block_idx_last_scheduled_token, Tensor initial_state_idx, int64 pad_slot_id=-1, int64 max_query_len=-1, int64 residual_connection=1, int64 block_size=128, int64 conv_mode=1, bool inplace=false, string activation="none", int64 run_mode=0) -> (Tensor y, Tensor conv_states)
