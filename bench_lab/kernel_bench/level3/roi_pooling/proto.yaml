operator:
  name: ROIPooling
  category: Reduction
  difficulty: L3
  formula: y = roi_pool(x, rois, output_size)
  description: 对输入特征图按ROI进行最大池化
  shape_support: 'x: [N, C, H, W], rois: [num_rois, 5]'
  attrs:
  - name: pooled_h
    type: int
    description: 池化后高度
    required: true
  - name: pooled_w
    type: int
    description: 池化后宽度
    required: true
  - name: spatial_scale
    type: float
    description: 空间缩放因子 (用于将ROI坐标映射到输入特征图尺寸)
    required: true
  inputs:
  - name: x
    description: 输入特征图
    dtype:
    - float32
    - float16
  - name: rois
    description: ROI框
    dtype:
    - float32
    - float16
  outputs:
  - name: y
    description: 输出张量，ROI池化结果
    dtype:
    - float32
    - float16
  schema: roi_pooling(Tensor x, Tensor rois, int pooled_h, int pooled_w, float spatial_scale)
    -> Tensor y
