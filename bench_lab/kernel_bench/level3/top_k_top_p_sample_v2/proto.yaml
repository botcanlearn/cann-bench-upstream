operator:
  name: TopKTopPSampleV2
  category: SortSelect
  difficulty: L3
  formula: top_k_top_p_sample_v2(...) -> (Tensor logits_select_idx, Tensor logits_top_kp_select, Tensor logits_idx, Tensor logits_sort_masked)
  description: TopKTopPSampleV2算子
  shape_support: 输入ND格式
  attrs:
  - name: eps
    type: float
    default: EPS_DEFAULT
    description: 'eps属性'
    required: false
  - name: is_need_logits
    type: bool
    default: IS_NEED_LOGITS_DEFAULT
    description: 'is_need_logits属性'
    required: false
  - name: top_k_guess
    type: int64
    default: TOP_K_GUESS_DEFAULT
    description: 'top_k_guess属性'
    required: false
  - name: ks_max
    type: int64
    default: KS_MAX_DEFAULT
    description: 'ks_max属性'
    required: false
  - name: input_is_logits
    type: bool
    default: INPUT_IS_LOGITS_DEFAULT
    description: 'input_is_logits属性'
    required: false
  - name: is_need_sample_result
    type: bool
    default: false
    description: 'is_need_sample_result属性'
    required: false
  inputs:
  - name: logits
    description: 输入张量logits
    dtype:
    - float16
    - bfloat16
    - float32
  - name: top_k
    description: 输入张量top_k
    dtype:
    - int32
  - name: top_p
    description: 输入张量top_p
    dtype:
    - float16
    - bfloat16
    - float32
  - name: q
    description: 输入张量q
    dtype:
    - float32
  - name: min_ps
    description: 输入张量min_ps
    dtype:
    - float16
    - bfloat16
    - float32
  outputs:
  - name: logits_select_idx
    description: 输出张量logits_select_idx
    dtype:
    - int64
    compare: false
    index_gather: true
  - name: logits_top_kp_select
    description: 输出张量logits_top_kp_select
    dtype:
    - float32
  - name: logits_idx
    description: 输出张量logits_idx
    dtype:
    - int64
    compare: false
    index_gather: true
  - name: logits_sort_masked
    description: 输出张量logits_sort_masked
    dtype:
    - float32
  schema: top_k_top_p_sample_v2(Tensor logits, Tensor top_k, Tensor top_p, Tensor q, Tensor min_ps, float eps=EPS_DEFAULT, bool is_need_logits=IS_NEED_LOGITS_DEFAULT, int64 top_k_guess=TOP_K_GUESS_DEFAULT, int64 ks_max=KS_MAX_DEFAULT, bool input_is_logits=INPUT_IS_LOGITS_DEFAULT, bool is_need_sample_result=false) -> (Tensor logits_select_idx, Tensor logits_top_kp_select, Tensor logits_idx, Tensor logits_sort_masked)
