operator:
  name: EmbeddingHashTableLookupOrInsert
  category: HashTable
  difficulty: L3
  formula: |
    hash_idx = hash(key) mod bucket_size
    values[i] = table[hash_idx] if key exists else default_value
  description: 哈希表动态查找/插入算子，根据key在哈希表中查找或插入value
  shape_support: 'table_handle: [5]; keys: 任意形状; values: (N, embedding_dim)'
  attrs:
  - name: bucket_size
    type: int
    description: 哈希表容量（必选）
    required: true
  - name: embedding_dim
    type: int
    description: value的维度（必选）
    required: true
  - name: filter_mode
    type: string
    default: "no_filter"
    description: 过滤模式，可选"no_filter"或"counter"
    required: false
  - name: filter_freq
    type: int
    default: "0"
    description: 过滤阈值
    required: false
  - name: default_key_or_value
    type: bool
    default: "false"
    description: True返回default_key值，False返回default_value
    required: false
  - name: default_key
    type: int
    default: "0"
    description: 默认key
    required: false
  - name: default_value
    type: float
    default: "0.0"
    description: 默认value
    required: false
  - name: filter_key_flag
    type: bool
    default: "false"
    description: 启用filter_key功能
    required: false
  - name: filter_key
    type: int
    default: "-1"
    description: 过滤key
    required: false
  inputs:
  - name: table_handle
    description: 哈希表句柄，包含表头地址等信息，shape为[5]
    dtype:
    - int64
    shape: '[5]'
  - name: keys
    description: 要查找/插入的key序列
    dtype:
    - int64
    shape: '任意形状'
  outputs:
  - name: values
    description: 查找到或插入后的值，shape为(N, embedding_dim)
    dtype:
    - float32
    shape: '(N, embedding_dim)'
  schema: embedding_hash_table_lookup_or_insert(Tensor table_handle, Tensor keys, int bucket_size, int embedding_dim, str filter_mode="no_filter", int filter_freq=0, bool default_key_or_value=False, int default_key=0, float default_value=0.0, bool filter_key_flag=False, int filter_key=-1) -> Tensor values