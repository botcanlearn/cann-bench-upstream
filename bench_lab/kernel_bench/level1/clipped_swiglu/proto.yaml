operator:
  name: ClippedSwiglu
  category: Elementwise
  difficulty: L1
  formula: clipped_swiglu(...) -> Tensor y
  description: 带截断的Swish门控线性单元激活函数，支持GPT-OSS变体SwiGlu及MoE分组场景
  shape_support: 输入ND格式，支持任意维度
  attrs:
  - name: dim
    type: int64
    default: -1
    description: 合轴及切分的维度序号，取值范围[-x.dim(), x.dim()-1]
    required: false
  - name: alpha
    type: float
    default: 1.702
    description: 变体SwiGlu使用的参数
    required: false
  - name: limit
    type: float
    default: 7.0
    description: 变体SwiGlu使用的门限值，必须大于0
    required: false
  - name: bias
    type: float
    default: 1.0
    description: 变体SwiGlu使用的偏差参数
    required: false
  - name: interleaved
    type: bool
    default: true
    description: true=奇偶切分，false=前后切分
    required: false
  inputs:
  - name: x
    description: 输入张量x，dim对应维度上必须是偶数
    dtype:
    - float16
    - float32
    - bfloat16
  - name: group_index
    description: 可选输入，MoE分组索引，1维且元素个数<=1024
    dtype:
    - int64
    required: false
  outputs:
  - name: y
    description: 输出张量y，dim对应维度为x的一半
    dtype:
    - float16
    - float32
    - bfloat16
  schema: clipped_swiglu(Tensor x, Tensor group_index=None, int64 dim=-1, float alpha=1.702, float limit=7.0, float bias=1.0, bool interleaved=true) -> Tensor y
