operator:
  name: AllGatherMatmul
  category: FusedComposite
  difficulty: L4
  formula: |
    gather_x = AllGather(x1) along dim 0
    y = gather_x @ x2 (+ bias)
    gather_out = gather_x when gather_output=True
  description: MC2 all-gather and matmul fused operator. Cases are converted from mc2_test/aclnnAllGatherMatmul.xlsx and require one HCCL process per rank.
  shape_support: 'x1: [M_local, K], x2: [K, N] or [N, K] when is_trans_b=true, bias: [N]; y: [M_local * world_size, N]'
  precision_thresholds:
    float16: 0.005
    bfloat16: 0.005
  attrs:
  - name: mc2_distributed
    type: bool
    default: true
    description: Route this task through the cann-bench MC2 distributed runner.
  - name: world_size
    type: int
    description: Number of HCCL ranks.
  - name: gather_output
    type: bool
    default: true
    description: Whether the fused operator returns the gathered x1 tensor.
  - name: is_trans_b
    type: bool
    default: false
    description: Whether x2 is stored as [N, K] and should be transposed before matmul.
  - name: is_bias
    type: bool
    default: false
    description: Whether bias is present.
  - name: seed
    type: int
    default: 1
    description: mc2_test-compatible input seed.
  - name: weight_same
    type: int
    default: 0
    description: mc2_test-compatible weight seed mode.
  inputs:
  - name: x1
    description: Local rank input tensor.
    dtype: [float16, bfloat16]
    shape: '[M_local, K]'
  - name: x2
    description: Matmul weight tensor.
    dtype: [float16, bfloat16]
    shape: '[K, N] or [N, K]'
  - name: bias
    description: Optional matmul bias.
    dtype: [float16, bfloat16]
    shape: '[N]'
    optional: true
  outputs:
  - name: y
    description: Matmul result after all-gather.
    dtype: [float16, bfloat16]
    shape: '[M_local * world_size, N]'
  - name: gather_out
    description: Optional gathered x1 tensor.
    dtype: [float16, bfloat16]
    shape: '[M_local * world_size, K]'
  schema: all_gather_matmul(Tensor x1, Tensor x2, str hcomm_info, int world_size, Tensor? bias=None, bool gather_output=True, bool is_trans_b=False) -> (Tensor y, Tensor gather_out)
