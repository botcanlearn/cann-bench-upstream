operator:
  name: GroupedMatMulAlltoAllv
  category: FusedComposite
  difficulty: L4
  formula: |
    gmmY = GroupedMatMul(gmmX, gmmWeight)
    unpermuteOut = Unpermute(gmmY)
    y = AllToAllv(unpermuteOut)
    mmY = mmX @ mmWeight (optional shared expert)
  description: MC2 grouped matmul and all-to-allv fused operator (GMM → Unpermute → AlltoAllv). Supports optional shared expert MatMul in parallel. Cases are converted from mc2_test/excel/aclnnGroupedMatMulAlltoAllv.xlsx level0 sheet.
  shape_support: 'gmm_x: [A, H1], gmm_weight: [e, H1, N1] or [e, N1, H1] when trans_gmm_weight=true, mm_x: [BS, H2], mm_weight: [H2, N2] or [N2, H2] when trans_mm_weight=true; y: [BSK, N1], mm_y: [BS, N2]'
  precision_thresholds:
    float16: 0.005
    bfloat16: 0.005
  attrs:
  - name: mc2_distributed
    type: bool
    default: true
    description: Route this task through the cann-bench MC2 distributed runner.
  - name: world_size
    type: int
    description: Number of HCCL ranks.
  - name: e
    type: int
    description: Number of experts per card.
  - name: trans_gmm_weight
    type: bool
    default: false
    description: Whether gmm_weight is stored as [e, N1, H1] and should be transposed before GMM.
  - name: trans_mm_weight
    type: bool
    default: false
    description: Whether mm_weight is stored as [N2, H2] and should be transposed before MatMul.
  - name: mm_out
    type: bool
    default: false
    description: Whether shared expert mm output is present (mm_x and mm_weight are provided).
  - name: seed
    type: int
    default: 1
    description: Random seed for token distribution generation.
  - name: graph_type
    type: int
    default: 0
    description: Graph execution mode (0=single op, 1=static graph, 2=dynamic graph).
  inputs:
  - name: gmm_x
    description: Input tensor for grouped matmul and all-to-allv communication.
    dtype: [float16, bfloat16]
    shape: '[A, H1]'
  - name: gmm_weight
    description: Weight tensor for grouped matmul.
    dtype: [float16, bfloat16]
    shape: '[e, H1, N1] or [e, N1, H1]'
  - name: send_counts
    description: Send counts for all-to-allv (int list of length world_size * e, derived from token distribution).
    dtype: [int64]
    shape: '[world_size * e]'
  - name: recv_counts
    description: Receive counts for all-to-allv (int list of length world_size * e, derived from token distribution).
    dtype: [int64]
    shape: '[world_size * e]'
  - name: mm_x
    description: Optional input for shared expert matmul.
    dtype: [float16, bfloat16]
    shape: '[BS, H2]'
    optional: true
  - name: mm_weight
    description: Optional weight for shared expert matmul.
    dtype: [float16, bfloat16]
    shape: '[H2, N2] or [N2, H2]'
    optional: true
  outputs:
  - name: y
    description: Final output after GMM, unpermute, and all-to-allv.
    dtype: [float16, bfloat16]
    shape: '[BSK, N1]'
  - name: mm_y
    description: Optional shared expert matmul output.
    dtype: [float16, bfloat16]
    shape: '[BS, N2]'
    optional: true
  schema: grouped_mat_mul_allto_allv(Tensor gmm_x, Tensor gmm_weight, int[] send_counts, int[] recv_counts, Tensor? mm_x=None, Tensor? mm_weight=None, str hcomm_info, int world_size, bool trans_gmm_weight=False, bool trans_mm_weight=False) -> (Tensor y, Tensor? mm_y)
