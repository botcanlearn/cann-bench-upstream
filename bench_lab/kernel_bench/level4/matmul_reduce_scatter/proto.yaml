operator:
  name: MatmulReduceScatter
  category: FusedComposite
  difficulty: L4
  formula: |
    mm = x1 @ x2 (+ bias)
    y = ReduceScatter(mm, op=sum) along dim 0
  description: MC2 matmul and reduce-scatter fused operator. Cases are converted from mc2_test/aclnnMatmulReduceScatter.xlsx and require one HCCL process per rank.
  shape_support: 'x1: [M, K], x2: [K, N] or [N, K] when is_trans_b=true, bias: [N]; y: [M / world_size, N]'
  precision_thresholds:
    float16: 0.005
    bfloat16: 0.005
  attrs:
  - name: mc2_distributed
    type: bool
    default: true
    description: Route this task through the cann-bench MC2 distributed runner.
  - name: world_size
    type: int
    description: Number of HCCL ranks.
  - name: reduce_op
    type: str
    default: sum
    description: Reduce operation. Current mc2_test cases use sum.
  - name: is_trans_b
    type: bool
    default: false
    description: Whether x2 is stored as [N, K] and should be transposed before matmul.
  - name: is_bias
    type: bool
    default: false
    description: Whether bias is present.
  - name: seed
    type: int
    default: 1
    description: mc2_test-compatible input seed.
  - name: weight_same
    type: int
    default: 0
    description: mc2_test-compatible weight seed mode.
  inputs:
  - name: x1
    description: Matmul input tensor.
    dtype: [float16, bfloat16]
    shape: '[M, K]'
  - name: x2
    description: Matmul weight tensor.
    dtype: [float16, bfloat16]
    shape: '[K, N] or [N, K]'
  - name: bias
    description: Optional matmul bias.
    dtype: [float16, bfloat16]
    shape: '[N]'
    optional: true
  outputs:
  - name: y
    description: Reduce-scattered matmul result.
    dtype: [float16, bfloat16]
    shape: '[M / world_size, N]'
  schema: matmul_reduce_scatter(Tensor x1, Tensor x2, str hcomm_info, int world_size, str reduce_op="sum", Tensor? bias=None, bool is_trans_b=False) -> Tensor y
