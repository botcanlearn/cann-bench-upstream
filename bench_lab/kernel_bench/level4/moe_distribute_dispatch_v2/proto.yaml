operator:
  name: MoeDistributeDispatchV2
  category: FusedComposite
  difficulty: L4
  formula: |
    allToAllXOut = AllToAllV(x)
    expandXOut =
      AllToAllV(x)              if no TP comm
      AllGatherV(allToAllXOut)  if TP comm exists
    dynamicScalesOut = AllToAllV(1.0/dynamicScales)  (quant_mode > 0)
  description: |
    MC2 dispatch operator for MoE (Mixture-of-Experts). Performs optional quantization,
    EP-domain AllToAllV communication, and optional TP-domain AllGatherV communication.
    Outputs expanded tokens, dynamic scales, and auxiliary info for the companion
    MoeDistributeCombineV2 operator. Cases are converted from ops-transformer UT cases.
  shape_support: 'x: [BS, H], expert_ids: [BS, K]; expand_x: [max(tp_world_size,1)*A, H]'
  precision_thresholds:
    float16: 0.005
    bfloat16: 0.005
  attrs:
  - name: mc2_distributed
    type: bool
    default: true
    description: Route this task through the cann-bench MC2 distributed runner.
  - name: world_size
    type: int
    description: EP communication domain size (ep_world_size).
  - name: tp_world_size
    type: int
    default: 0
    description: TP communication domain size. 0 or 1 means no TP communication.
  - name: moe_expert_num
    type: int
    description: Total number of MoE experts.
  - name: shared_expert_num
    type: int
    default: 1
    description: Number of shared experts.
  - name: shared_expert_rank_num
    type: int
    default: 0
    description: Number of ranks dedicated to shared experts.
  - name: quant_mode
    type: int
    default: 0
    description: Quantization mode (0=no quant, 2=pertoken dynamic quant).
  - name: graph_type
    type: int
    default: 0
    description: Graph execution mode (0=single op, 1=static graph, 2=dynamic graph).
  - name: seed
    type: int
    default: 1
    description: Random seed for input generation.
  - name: activeMask_Dim
    type: int
    default: 0
    description: x_active_mask dimensionality. 0=None, 1=1D(BS,), 2=2D(BS,K).
  - name: is_combine_x
    type: int
    default: 0
    description: Whether expert_scales (combine_x) input is provided.
  - name: comm_mode
    type: int
    default: 0
    description: Communication algorithm mode (0=default, 2=hierarchy). Maps to comm_alg string.
  - name: is_elastic
    type: int
    default: 0
    description: Whether elastic_info is provided.
  - name: zero_expert_num
    type: int
    default: 0
    description: Number of zero experts.
  - name: copy_expert_num
    type: int
    default: 0
    description: Number of copy experts.
  - name: const_expert_num
    type: int
    default: 0
    description: Number of const experts.
  - name: case_name
    type: str
    description: Original case identifier from ops-transformer UT.
  inputs:
  - name: x
    description: Token feature tensor on this rank.
    dtype: [float16, bfloat16]
    shape: '[BS, H]'
  - name: expert_ids
    description: Top-K expert indices for each token.
    dtype: [int32]
    shape: '[BS, K]'
  outputs:
  - name: expand_x
    description: Expanded token features after dispatch communication.
    dtype: [float16, bfloat16]
    shape: '[max(tp_world_size,1)*A, H]'
  - name: dynamic_scales
    description: Dynamic quantization scales (valid when quant_mode > 0).
    dtype: [float32]
    shape: '[A] or [A, ceil(H/128)]'
    optional: true
  - name: assist_info_for_combine
    description: Auxiliary info for CombineV2 operator.
    dtype: [int32]
    shape: '[A*128, ]'
  - name: expert_token_nums
    description: Token count per local expert.
    dtype: [int64]
    shape: '[localExpertNum, ]'
  - name: ep_recv_counts
    description: Receive counts from EP domain ranks.
    dtype: [int32]
    shape: '[ep_world_size*max(tp_world_size,1)*localExpertNum, ]'
  - name: tp_recv_counts
    description: Receive counts from TP domain ranks.
    dtype: [int32]
    shape: '[tp_world_size, ]'
    optional: true
  - name: expand_scales
    description: Expanded expert scales for CombineV2.
    dtype: [float32]
    shape: '[A, ]'
    optional: true
  schema: moe_distribute_dispatch_v2(Tensor x, Tensor expert_ids, str group_ep, int ep_world_size, int ep_rank_id, int moe_expert_num, Tensor? scales=None, Tensor? x_active_mask=None, Tensor? expert_scales=None, Tensor? elastic_info=None, Tensor? performance_info=None, str group_tp="", int tp_world_size=0, int tp_rank_id=0, int expert_shard_type=0, int shared_expert_num=1, int shared_expert_rank_num=0, int quant_mode=0, int global_bs=0, int expert_token_nums_type=1, str comm_alg="", int zero_expert_num=0, int copy_expert_num=0, int const_expert_num=0) -> (Tensor expand_x, Tensor dynamic_scales, Tensor assist_info_for_combine, Tensor expert_token_nums, Tensor ep_recv_counts, Tensor tp_recv_counts, Tensor expand_scales)
