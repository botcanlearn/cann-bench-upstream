operator:
  name: FlashAttentionMask
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) masked by the supplied boolean mask) @
    V
  description: Computes scaled dot-product attention under a supplied boolean visibility mask.
  shape_support: q [B, H, Sq, D], k/v [B, H, Skv, D], mask [B, H, Sq, Skv].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], mask [B, H, Sq, Skv].
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], mask [B, H, Sq, Skv].
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], mask [B, H, Sq, Skv].
  - name: mask
    description: mask input tensor
    dtype:
    - uint8
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], mask [B, H, Sq, Skv].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_mask(Tensor q, Tensor k, Tensor v, Tensor mask) -> Tensor
    output
