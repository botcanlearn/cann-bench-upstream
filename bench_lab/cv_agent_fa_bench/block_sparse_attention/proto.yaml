operator:
  name: BlockSparseAttention
  category: FusedComposite
  difficulty: L4
  formula: Y blocks are computed as softmax(Q_block @ K_block^T / sqrt(D)) @ V_block
    for each block.
  description: Computes scaled dot-product attention independently inside fixed-size sequence blocks.
  shape_support: q/k/v [B, H, S, D], S must be divisible by block_size.
  attrs:
  - name: block_size
    type: int
    default: 32
    description: block_size operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S must be divisible by block_size.
  - name: k
    description: k input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S must be divisible by block_size.
  - name: v
    description: v input tensor
    dtype:
    - float16
    shape: q/k/v [B, H, S, D], S must be divisible by block_size.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: block_sparse_attention(Tensor q, Tensor k, Tensor v, int block_size=32)
    -> Tensor output
