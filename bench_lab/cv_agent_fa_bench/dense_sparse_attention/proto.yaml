operator:
  name: DenseSparseAttention
  category: FusedComposite
  difficulty: L4
  formula: Gather sparse KV entries from paged cache by indices, then compute top-k
    attention per query/head.
  description: Gathers selected tokens from a paged single-head KV cache and attends per query.
  shape_support: q [B, Sq, H, Dqk], kv_cache [Blocks, Page, 1, Dqk], indices [B, Sq,
    H, TopK].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    shape: q [B, Sq, H, Dqk], kv_cache [Blocks, Page, 1, Dqk], indices [B, Sq, H,
      TopK].
  - name: kv_cache
    description: kv_cache input tensor
    dtype:
    - bfloat16
    shape: q [B, Sq, H, Dqk], kv_cache [Blocks, Page, 1, Dqk], indices [B, Sq, H,
      TopK].
  - name: indices
    description: indices input tensor
    dtype:
    - int32
    shape: q [B, Sq, H, Dqk], kv_cache [Blocks, Page, 1, Dqk], indices [B, Sq, H,
      TopK].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    shape: defined by the reference forward result
  schema: dense_sparse_attention(Tensor q, Tensor kv_cache, Tensor indices) -> Tensor
    output
