operator:
  name: FlashAttentionSink
  category: FusedComposite
  difficulty: L4
  formula: Concatenate sink K/V with ordinary K/V, then compute scaled dot-product
    attention.
  description: Prepends sink K/V tokens to ordinary K/V tokens before scaled dot-product attention.
  shape_support: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  - name: k
    description: k input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  - name: v
    description: v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  - name: sink_k
    description: sink_k input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  - name: sink_v
    description: sink_v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, Sq, D], k/v [B, H, Skv, D], sink_k/sink_v [B, H, Sink, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_sink(Tensor q, Tensor k, Tensor v, Tensor sink_k, Tensor
    sink_v) -> Tensor output
