operator:
  name: ScaledDotProductAttention
  category: FusedComposite
  difficulty: L4
  formula: Y = dropout(softmax(Q @ K^T / sqrt(D))) @ V
  description: Computes scaled dot-product attention with the reference dropout setting.
  shape_support: Q/K/V [B, H, S, D].
  attrs:
  - name: dropout
    type: float
    default: 0.0
    description: dropout operator attribute
    required: false
  inputs:
  - name: Q
    description: Q input tensor
    dtype:
    - float16
    shape: Q/K/V [B, H, S, D].
  - name: K
    description: K input tensor
    dtype:
    - float16
    shape: Q/K/V [B, H, S, D].
  - name: V
    description: V input tensor
    dtype:
    - float16
    shape: Q/K/V [B, H, S, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: scaled_dot_product_attention(Tensor Q, Tensor K, Tensor V, float dropout=0.0)
    -> Tensor output
