operator:
  name: MultiHeadLatentAttention
  category: FusedComposite
  difficulty: L4
  formula: Reconstruct latent KV cache through block_table and compute broadcast single-KV-head
    attention.
  description: Reconstructs a paged single-KV-head latent cache and broadcasts it to query heads.
  shape_support: q [B, Sq, Hq, Dqk], latent kv_cache [Blocks, Page, 1, Dqk], block_table
    [B, MaxBlocks].
  attrs:
  - name: causal
    type: bool
    default: true
    description: causal operator attribute
    required: false
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    shape: q [B, Sq, Hq, Dqk], latent kv_cache [Blocks, Page, 1, Dqk], block_table
      [B, MaxBlocks].
  - name: kv_cache
    description: kv_cache input tensor
    dtype:
    - bfloat16
    shape: q [B, Sq, Hq, Dqk], latent kv_cache [Blocks, Page, 1, Dqk], block_table
      [B, MaxBlocks].
  - name: block_table
    description: block_table input tensor
    dtype:
    - int32
    shape: q [B, Sq, Hq, Dqk], latent kv_cache [Blocks, Page, 1, Dqk], block_table
      [B, MaxBlocks].
  - name: cache_seqlens
    description: cache_seqlens input tensor
    dtype:
    - int32
    shape: q [B, Sq, Hq, Dqk], latent kv_cache [Blocks, Page, 1, Dqk], block_table
      [B, MaxBlocks].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    shape: defined by the reference forward result
  schema: multi_head_latent_attention(Tensor q, Tensor kv_cache, Tensor block_table,
    Tensor cache_seqlens, bool causal=True) -> Tensor output
