operator:
  name: FlashAttentionSparse
  category: FusedComposite
  difficulty: L4
  formula: Gather sparse KV entries by indices and compute sparse top-k attention.
  description: Uses per-query top-k KV indices to compute sparse flash-attention-style output.
  shape_support: q [B, Sq, Hq, D], kv [B, Skv, Hkv, D], indices [B, Sq, Hkv, TopK].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, Sq, Hq, D], kv [B, Skv, Hkv, D], indices [B, Sq, Hkv, TopK].
  - name: kv
    description: kv input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, Sq, Hq, D], kv [B, Skv, Hkv, D], indices [B, Sq, Hkv, TopK].
  - name: indices
    description: indices input tensor
    dtype:
    - int32
    shape: q [B, Sq, Hq, D], kv [B, Skv, Hkv, D], indices [B, Sq, Hkv, TopK].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_sparse(Tensor q, Tensor kv, Tensor indices) -> Tensor output
