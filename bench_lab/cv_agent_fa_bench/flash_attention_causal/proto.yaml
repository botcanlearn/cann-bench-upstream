operator:
  name: FlashAttentionCausal
  category: FusedComposite
  difficulty: L4
  formula: Y = softmax((Q @ K^T / sqrt(D)) + causal_mask) @ V
  description: Computes scaled dot-product attention with a lower-triangular causal mask.
  shape_support: q/k/v [B, H, S, D] with causal lower-triangular masking.
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q/k/v [B, H, S, D] with causal lower-triangular masking.
  - name: k
    description: k input tensor
    dtype:
    - bfloat16
    - float16
    shape: q/k/v [B, H, S, D] with causal lower-triangular masking.
  - name: v
    description: v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q/k/v [B, H, S, D] with causal lower-triangular masking.
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_causal(Tensor q, Tensor k, Tensor v) -> Tensor output
