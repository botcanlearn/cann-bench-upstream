operator:
  name: FlashAttentionSinkPa
  category: FusedComposite
  difficulty: L4
  formula: Reconstruct paged cache per batch, prepend sink tokens, then compute attention
    for the single query token.
  description: Combines paged local cache tokens with sink tokens for single-token decode attention.
  shape_support: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors
    [B, H, Sink, D].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: k_cache
    description: k_cache input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: v_cache
    description: v_cache input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: block_table
    description: block_table input tensor
    dtype:
    - int32
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: context_lens
    description: context_lens input tensor
    dtype:
    - int32
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: sink_k
    description: sink_k input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  - name: sink_v
    description: sink_v input tensor
    dtype:
    - bfloat16
    - float16
    shape: q [B, H, 1, D], paged cache [TotalBlocks, H, Block, D], sink tensors [B,
      H, Sink, D].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - bfloat16
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_sink_pa(Tensor q, Tensor k_cache, Tensor v_cache, Tensor
    block_table, Tensor context_lens, Tensor sink_k, Tensor sink_v) -> Tensor output
