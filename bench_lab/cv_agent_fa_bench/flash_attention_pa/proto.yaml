operator:
  name: FlashAttentionPa
  category: FusedComposite
  difficulty: L4
  formula: Gather paged K/V cache by block_table, then compute scaled dot-product
    attention against q.
  description: Reconstructs paged K/V cache entries through a block table before attention.
  shape_support: q [B, H, S, D], paged k/v cache [Blocks, Block, H, D], block_table
    [B, Pages].
  attrs: []
  inputs:
  - name: q
    description: q input tensor
    dtype:
    - float16
    shape: q [B, H, S, D], paged k/v cache [Blocks, Block, H, D], block_table [B,
      Pages].
  - name: k_cache
    description: k_cache input tensor
    dtype:
    - float16
    shape: q [B, H, S, D], paged k/v cache [Blocks, Block, H, D], block_table [B,
      Pages].
  - name: v_cache
    description: v_cache input tensor
    dtype:
    - float16
    shape: q [B, H, S, D], paged k/v cache [Blocks, Block, H, D], block_table [B,
      Pages].
  - name: block_table
    description: block_table input tensor
    dtype:
    - int32
    shape: q [B, H, S, D], paged k/v cache [Blocks, Block, H, D], block_table [B,
      Pages].
  outputs:
  - name: output
    description: golden output tensor
    dtype:
    - float16
    shape: defined by the reference forward result
  schema: flash_attention_pa(Tensor q, Tensor k_cache, Tensor v_cache, Tensor block_table)
    -> Tensor output
