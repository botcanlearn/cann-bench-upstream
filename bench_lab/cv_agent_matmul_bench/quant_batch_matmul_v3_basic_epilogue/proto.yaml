operator:
  name: QuantBatchMatmulV3
  category: Contraction
  difficulty: L3
  formula: |
    mm = x1.int32 @ x2.int32
    bf16_basic:     y = mm * scale + bias
    pertoken_basic: y = mm * scale * perTokenScale[:, None] + bias
  description: quant_batch_matmul_v3 的基础 C->V 路径。AIC 完成 int8 matmul，AIV 执行 per-channel scale、可选 per-token scale、浮点 bias 和写回。本 benchmark 不覆盖 INT32 bias、offset、int4、fp8、batch、转置和融合激活路径。
  shape_support: |
    x1: [M, K] int8
    x2: [K, N] int8
    scale: [N] bfloat16/float32
    bias: [N] bfloat16/float32
    perTokenScale: [M] float32, only for pertoken_basic
    y: [M, N] bfloat16/float16/float32
  attrs:
  - name: variant
    type: string
    default: bf16_basic
    description: selected kernel path, bf16_basic or pertoken_basic
    required: false
  - name: y_dtype
    type: string
    default: bfloat16
    description: golden output dtype
    required: false
  inputs:
  - name: x1
    description: int8 activation matrix
    dtype: [int8]
  - name: x2
    description: int8 weight matrix
    dtype: [int8]
  - name: scale
    description: per-channel dequant scale
    dtype: [bfloat16, float32]
  - name: bias
    description: floating-point bias applied after dequant
    dtype: [bfloat16, float32]
  - name: perTokenScale
    description: per-token dequant scale for pertoken_basic
    dtype: [float32]
    optional: true
  outputs:
  - name: y
    description: dequantized matrix multiplication result
    dtype: [bfloat16, float16, float32]
  schema: quant_batch_matmul_v3(Tensor x1, Tensor x2, Tensor scale, Tensor bias, Tensor? perTokenScale, str variant="bf16_basic", str y_dtype="bfloat16") -> Tensor y

precision:
  outputs:
  - name: y
    dtype: [bfloat16, float16, float32]
    threshold_rule: output_dtype
