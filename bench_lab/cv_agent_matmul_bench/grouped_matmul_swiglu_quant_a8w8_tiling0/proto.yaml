operator:
  name: GroupedMatmulSwigluQuant
  category: FusedComposite
  difficulty: L4
  formula: |
    for expert i:
      C = (X_i.int32 @ W_i.int32) * xScale_i[:, None] * weightScale_i[None, :]
      C_act, gate = split(C)
      S = swish(C_act) * gate
      yScale = max(abs(S), dim=-1) / 127
      y = round(S / yScale[:, None]).clamp(-128, 127).to(int8)
  description: grouped_matmul_swiglu_quant A8W8 tiling_key=0 C->V path. This benchmark covers grouped int8 matmul, dequant, SwiGLU, and dynamic int8 quantization in a single selected kernel path.
  shape_support: |
    x: [M, K] int8
    weight: [E, K, N] int8, N must be even
    weightScale: [E, N] float32
    xScale: [M] float32
    groupList: [E] int64 cumsum
    y: [M, N/2] int8
    yScale: [M] float32
  attrs:
  - name: variant
    type: string
    default: A8W8_tiling_key_0
    description: selected kernel path
    required: false
  - name: group_list_values
    type: ListInt
    description: deterministic cumsum groupList
    required: true
  - name: tiling_key
    type: int
    default: 0
    description: fixed to 0 in this benchmark
    required: false
  inputs:
  - name: x
    description: int8 activation tokens
    dtype: [int8]
  - name: weight
    description: int8 expert weight tensor
    dtype: [int8]
  - name: weightScale
    description: per-expert per-channel dequant scale
    dtype: [float32]
  - name: xScale
    description: per-token activation dequant scale
    dtype: [float32]
  - name: groupList
    description: cumsum token boundary list
    dtype: [int64]
  outputs:
  - name: y
    description: dynamic quantized SwiGLU output
    dtype: [int8]
  - name: yScale
    description: per-token output quantization scale
    dtype: [float32]
  schema: grouped_matmul_swiglu_quant(Tensor x, Tensor weight, Tensor weightScale, Tensor xScale, Tensor groupList, str variant="A8W8_tiling_key_0", int tiling_key=0) -> (Tensor y, Tensor yScale)

precision:
  outputs:
  - name: y
    dtype: int8
    threshold_rule: int8_three_tier
    int8_thresholds: {fatal_abs_diff: 2, tolerance_abs_diff: 1, bit_exact_ratio: 0.99}
  - name: yScale
    dtype: float32
    threshold_rule: intermediate_dtype_inherited
    intermediate_dtype: float32
  small_value_handling: {threshold: 1.0e-6, absolute_tolerance: 1.0e-5}
