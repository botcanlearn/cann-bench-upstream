operator:
  name: FusedQuantMatMul
  category: FusedComposite
  difficulty: L3
  formula: out = GELU((x1 @ x2) * x1Scale * x2Scale + bias)
  description: C->V QuantBatchMatmul fused with GELU post operation.
  shape_support: 'x1: [M,K] int8

    x2: [K,N] int8

    x1Scale: [M] float32

    x2Scale: [N] float32

    bias/out: [N]/[M,N] float32'
  attrs:
  - name: fused_op_type
    type: string
    default: gelu_erf
    description: 融合算子类型
    required: false
  - name: transpose_x1
    type: bool
    default: false
    description: 是否转置输入 x1
    required: false
  - name: transpose_x2
    type: bool
    default: false
    description: 是否转置输入 x2
    required: false
  - name: y_dtype
    type: string
    default: float32
    description: 输出数据类型
    required: false
  inputs:
  - name: x1
    dtype:
    - int8
  - name: x2
    dtype:
    - int8
  - name: x1Scale
    dtype:
    - float32
  - name: x2Scale
    dtype:
    - float32
  - name: bias
    dtype:
    - float32
  outputs:
  - name: out
    dtype:
    - float32
  schema: fused_quant_mat_mul(Tensor x1, Tensor x2, Tensor x1Scale, Tensor x2Scale,
    Tensor bias, str fused_op_type="gelu_erf", bool transpose_x1=false, bool transpose_x2=false,
    str y_dtype="float32") -> Tensor out
precision:
  outputs:
  - name: out
    dtype: float32
    threshold_rule: intermediate_dtype_inherited
    intermediate_dtype: float16
