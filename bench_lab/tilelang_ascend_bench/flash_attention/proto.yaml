operator:
  name: FlashAttention
  category: FusedComposite
  difficulty: L4
  formula: "y = softmax(Q @ K^T * scaleValue) @ V"
  description: 标准 Flash Attention（缩放点积注意力），对已分头的 Q/K/V 执行 softmax(QK^T * scale) @ V
  shape_support: "query [B, S, N, D]，key/value [B, S_kv, N, D]"
  attrs:
  - name: scaleValue
    type: float
    default: -1.0
    description: 缩放因子，<=0 时自动使用 1/sqrt(D)
    required: false
  - name: is_causal
    type: bool
    default: false
    description: 是否启用因果掩码（右下角对齐），True 时仅计算 attention 矩阵中 j <= i + (S_kv - S) 的位置
    required: false
  inputs:
  - name: query
    description: 查询张量（已分头）
    dtype:
    - float16
    - bfloat16
    shape: "[B, S, N, D]"
  - name: key
    description: 键张量（已分头）
    dtype:
    - float16
    - bfloat16
    shape: "[B, S_kv, N, D]"
  - name: value
    description: 值张量（已分头）
    dtype:
    - float16
    - bfloat16
    shape: "[B, S_kv, N, D]"
  outputs:
  - name: y
    description: 注意力输出张量
    dtype:
    - float16
    - bfloat16
    shape: "[B, S, N, D]"
  schema: flash_attention(Tensor query, Tensor key, Tensor value, float scaleValue=-1.0, bool is_causal=False) -> Tensor y
