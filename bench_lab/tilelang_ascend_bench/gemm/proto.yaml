operator:
  name: Gemm
  category: Contraction
  difficulty: L2
  formula: C[M, N] = A[M, K] @ B[K, N]
  description: 通用矩阵乘法（General Matrix Multiply），C = A × B，是深度学习中最核心的计算操作
  shape_support: 'A: [M, K]; B: [K, N]; 输出 C: [M, N]'
  attrs: []
  inputs:
  - name: A
    description: 左矩阵
    dtype:
    - float16
    - bfloat16
    shape: '[M, K]'
  - name: B
    description: 右矩阵（权重矩阵）
    dtype:
    - float16
    - bfloat16
    shape: '[K, N]'
  outputs:
  - name: C
    description: 矩阵乘法结果
    dtype:
    - float16
    - bfloat16
    shape: '[M, N]'
  schema: gemm(Tensor A, Tensor B) -> Tensor C
