operator:
  name: Gather
  category: IndexGather
  difficulty: L2
  formula: |
    沿 axis=dim 按 index 逐元素取值（PyTorch torch.gather 语义）。
    output[i_0, ..., i_{n-1}] = x[i_0, ..., i_{dim-1}, index[i_0, ..., i_{n-1}], i_{dim+1}, ..., i_{n-1}]
  description: 按 PyTorch torch.gather 语义，从输入张量沿 dim 维按 index 逐元素提取
  shape_support: |
    x 与 index 维度数相同；index.shape 除 dim 维外其余维度 <= x 对应维度，
    输出 shape 与 index.shape 完全一致
  attrs:
  - name: dim
    type: int64
    default: 0
    description: gather 操作的维度索引（torch.gather 的 dim 参数）
    required: false
  inputs:
  - name: x
    description: 输入张量（数据源）
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
  - name: index
    description: 索引张量；元素值需在 [0, x.shape[dim]) 范围内
    dtype:
    - int8
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，gather 结果（shape == index.shape，dtype 与 x 一致）
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
  schema: gather(Tensor x, Tensor index, int dim=0) -> Tensor y
