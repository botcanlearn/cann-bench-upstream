operator:
  name: ResizeBilinear
  category: FusedComposite
  difficulty: L2
  formula: y = resize_bilinear(x, size)
  description: 使用双线性插值调整图像大小
  shape_support: 输入 4D (N, C, H, W) 或 N 维张量
  attrs:
  - name: output_size
    type: INT64[]
    description: 输出尺寸 [output_height, output_width]
    required: true
  - name: align_corners
    type: BOOL
    default: "false"
    description: 是否对齐角点
    required: false
  - name: scale_factor
    type: FLOAT[]
    description: 缩放因子 [scale_height, scale_width]，与 output_size 互斥
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，调整大小后的结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: resize_bilinear(Tensor x, int[] output_size, bool align_corners=false, float[] scale_factor=null) -> Tensor y
