operator:
  name: UpsampleBicubic2dAA
  category: FusedComposite
  difficulty: L2
  formula: y = bicubic_upsample(x, output_size)
  description: 应用双三次抗锯齿算法进行上采样
  shape_support: 输入4D (N, C, H, W)
  attrs:
  - name: output_size
    type: INT64
    description: 输出尺寸
    required: true
  - name: align_corners
    type: BOOL
    default: false
    description: 是否对齐角点
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，上采样结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: upsample_bicubic2d_aa(Tensor x, int output_size, bool align_corners) ->
    Tensor y
