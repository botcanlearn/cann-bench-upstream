operator:
  name: Add
  category: Broadcast
  difficulty: L2
  formula: y = x1 + x2
  description: 对两个输入张量完成相加操作，支持广播
  shape_support: 输入支持广播，输出shape为广播后的shape
  attrs: []
  inputs:
  - name: x1
    description: 第1个输入张量
    dtype:
    - bool
    - int8
    - int32
    - int64
    - uint8
    - float16
    - bfloat16
    - float32
    - complex32
    - complex64
  - name: x2
    description: 第2个输入张量
    dtype:
    - bool
    - int8
    - int32
    - int64
    - uint8
    - float16
    - bfloat16
    - float32
    - complex32
    - complex64
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - bool
    - int8
    - int32
    - int64
    - uint8
    - float16
    - bfloat16
    - float32
    - complex32
    - complex64
  schema: add(Tensor x1, Tensor x2) -> Tensor y
