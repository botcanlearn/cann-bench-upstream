operator:
  name: UnsortedSegmentSum
  category: ScatterUpdate
  difficulty: L2
  formula: y[i] = sum(data[j]) where segment_ids[j] == i
  description: 沿segment_ids指定的段对数据进行求和
  shape_support: 输入ND格式
  attrs:
  - name: num_segments
    type: INT
    description: 段数量
    required: true
  inputs:
  - name: data
    description: 输入数据张量
    dtype:
    - float16
    - float32
    - int32
    - int64
  - name: segment_ids
    description: 段ID张量
    dtype:
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，段求和结果
    dtype:
    - float16
    - float32
    - int32
    - int64
  schema: unsorted_segment_sum(Tensor data, Tensor segment_ids, int num_segments)
    -> Tensor y
