operator:
  name: ResizeBilinearV2Grad
  category: FusedComposite
  difficulty: L2
  formula: y = resize_bilinear_grad(grads, original_size)
  description: ResizeBilinearV2 的反向传播
  shape_support: 'grads: 4D (N, C, H, W)'
  attrs:
  - name: original_size
    type: INT64[]
    description: 原始尺寸 [original_height, original_width]
    required: true
  - name: align_corners
    type: BOOL
    default: "false"
    description: 是否对齐角点
    required: false
  inputs:
  - name: grads
    description: 输入梯度张量，形状为 (N, C, H_out, W_out)
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出梯度张量，形状为 (N, C, H_in, W_in)
    dtype:
    - float16
    - float32
    - bfloat16
  schema: resize_bilinear_v2_grad(Tensor grads, int[] original_size, bool align_corners=false) -> Tensor y
