operator:
  name: Index
  category: IndexGather
  difficulty: L2
  formula: y = x[indices[0], indices[1], ...]
  description: 根据索引indices将输入x对应坐标的数据取出
  shape_support: 输入ND格式
  attrs: []
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
    - bool
  - name: indices
    description: 索引列表
    dtype:
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，索引结果
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
    - bool
  schema: index(Tensor x, Tensor indices) -> Tensor y
