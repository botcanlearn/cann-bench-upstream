operator:
  name: RealDiv
  category: Broadcast
  difficulty: L2
  formula: y = x1 / x2
  description: 对两个输入向量进行浮点除运算，对于bool类型输入数据，输出数据是float。
  shape_support: 输入支持广播，输出shape为广播后的shape
  attrs: []
  inputs:
  - name: x1
    description: 第1个输入张量（被除数）
    dtype:
    - bfloat16
    - float16
    - float32
    - int32
    - uint8
    - int8
    - bool
  - name: x2
    description: 第2个输入张量（除数）
    dtype:
    - bfloat16
    - float16
    - float32
    - int32
    - uint8
    - int8
    - bool
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - bfloat16
    - float16
    - float32
    - int32
    - uint8
    - int8
    - float
  schema: real_div(Tensor x1, Tensor x2) -> Tensor y
