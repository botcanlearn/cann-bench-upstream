operator:
  name: SpaceToBatch
  category: LayoutTransform
  difficulty: L2
  formula: y = space_to_batch(x, block_shape, paddings)
  description: 将空间维度的数据重排到batch维度，用于空洞卷积等场景
  shape_support: 输入4D张量 [N, H, W, C]
  attrs:
  - name: block_shape
    type: int64[]
    description: 空间维度的块大小 [block_h, block_w]
    required: true
  - name: paddings
    type: int64[]
    description: 空间维度的填充 [[pad_top, pad_bottom], [pad_left, pad_right]]
    required: true
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，空间维度重排后的结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: space_to_batch(Tensor x, int[] block_shape, int[] paddings) -> Tensor y
