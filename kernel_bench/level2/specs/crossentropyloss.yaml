operator:
  name: CrossEntropyLoss
  category: NumericalStable
  difficulty: L2
  formula: |
    L = -log(exp(x[target]) / sum(exp(x)))
    或带 weight: L = -weight[target] * log(exp(x[target]) / sum(exp(x)))
  description: 计算交叉熵损失，用于分类任务
  shape_support: |
    x (input): (N, C) - N=batch size, C=类别数
    target: (N,) 或 (N, C) (soft labels)
  attrs:
  - name: reduction
    type: string
    default: mean
    description: 损失聚合方式 ('none' | 'mean' | 'sum')
    required: false
  - name: ignore_index
    type: int
    default: -100
    description: 忽略的标签索引（不影响损失计算）
    required: false
  inputs:
  - name: x
    description: 输入 logits 张量（未经 softmax）
    dtype:
    - float32
    - float16
    - bfloat16
  - name: target
    description: 目标标签索引（hard labels）或概率分布（soft labels）
    dtype:
    - int32
    - int64
    - float32
    - float16
    - bfloat16
  outputs:
  - name: loss
    description: 损失值（reduction='none' 时 shape 为 (N,)，否则为标量）
    dtype:
    - float32
    - float16
    - bfloat16
  schema: cross_entropy_loss(Tensor x, Tensor target, str reduction, int ignore_index) -> Tensor loss