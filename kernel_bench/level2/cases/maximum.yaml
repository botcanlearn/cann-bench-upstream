# Maximum 算子测试用例
# 公式：y = max(x1, x2)
# 共 32 个用例，覆盖数据类型、维度、对齐/非对齐、Broadcast 场景

cases:
  # ==================== 基础功能测试 ====================
  - operator: Maximum
    case_id: 1
    input_shape: [[1024, 1024], [1024, 1024]]
    dtype: [float16, float16]
    attrs: {}
    value_range: [[-65504.0, 65504.0], [-65504.0, 65504.0]]
    baseline_perf_us: null
    note: float16 大 Shape-对齐 (1M 元素)

  - operator: Maximum
    case_id: 2
    input_shape: [[2097152], [2097152]]
    dtype: [float32, float32]
    attrs: {}
    value_range: [[-100.0, 100.0], [-100.0, 100.0]]
    baseline_perf_us: null
    note: float32 1D 长向量 - 对齐 (2M)

  - operator: Maximum
    case_id: 3
    input_shape: [[128, 128, 64], [128, 128, 64]]
    dtype: [bfloat16, bfloat16]
    attrs: {}
    value_range: [[-10.0, 10.0], [-10.0, 10.0]]
    baseline_perf_us: null
    note: bfloat16 3D 张量 - 对齐 (1M)

  - operator: Maximum
    case_id: 4
    input_shape: [[2, 8, 256, 256], [2, 8, 256, 256]]
    dtype: [float16, float16]
    attrs: {}
    value_range: [[-1.0, 1.0], [-1.0, 1.0]]
    baseline_perf_us: null
    note: float16 4D NCHW-对齐 (1M)

  - operator: Maximum
    case_id: 5
    input_shape: [[11, 13, 17, 64, 64], [11, 13, 17, 64, 64]]
    dtype: [float32, float32]
    attrs: {}
    value_range: [[0, 0], [0, 0]]
    baseline_perf_us: null
    note: float32 5D 质数非对齐 (1M)

