operator:
  name: Maximum
  category: Broadcast
  difficulty: L2
  formula: y = max(x1, x2)
  description: 返回两个输入张量中的最大值，支持广播
  shape_support: 输入支持广播
  attrs: []
  inputs:
  - name: x1
    description: 第1个输入张量
    dtype:
    - bfloat16
    - float16
    - float32
    - int8
    - int32
    - int64
  - name: x2
    description: 第2个输入张量
    dtype:
    - bfloat16
    - float16
    - float32
    - int8
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，两个输入中的最大值
    dtype:
    - bfloat16
    - float16
    - float32
    - int8
    - int32
    - int64
  schema: maximum(Tensor x1, Tensor x2) -> Tensor y
