operator:
  name: MoeGatingTopKSoftmax
  category: FusedComposite
  difficulty: L4
  formula: y = TopK(Softmax(x), k)
  description: MoE门控网络中Softmax和TopK的融合
  shape_support: 'x: 2D或3D'
  attrs:
  - name: k
    type: int
    description: topK数量
    required: true
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - bfloat16
    - float32
  outputs:
  - name: y
    description: 输出张量，topK结果
    dtype:
    - float16
    - bfloat16
    - float32
  - name: softmax_out
    description: Softmax输出
    dtype:
    - float16
    - bfloat16
    - float32
  schema: moe_gating_top_k_softmax(Tensor x, int k) -> (Tensor y, Tensor softmax_out)
