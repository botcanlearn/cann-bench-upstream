operator:
  name: Transpose
  category: LayoutTransform
  difficulty: L3
  formula: y[i0,...,in-1] = x[i_perm[0],...,i_perm[n-1]]
  description: 对tensor的任意维度进行调换
  shape_support: 输入维度<=8维
  attrs:
  - name: perm
    type: int[]
    description: 维度置换顺序
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int16
    - int32
    - int64
  outputs:
  - name: y
    description: 输出张量，转置后的结果
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int16
    - int32
    - int64
  schema: transpose(Tensor x, int[] perm) -> Tensor y
