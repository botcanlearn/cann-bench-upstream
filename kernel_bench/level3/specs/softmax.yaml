operator:
  name: Softmax
  category: NumericalStable
  difficulty: L3
  formula: y[i] = exp(x[i]) / sum(exp(x[j])) 沿指定轴
  description: 对输入张量在指定维度上计算Softmax值
  shape_support: 输入0-8维，输出与输入相同
  attrs:
  - name: dim
    type: int64
    default: -1
    description: '计算softmax的维度 (取值范围: -ndim ~ ndim-1, 负值表示从后往前数)'
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，与输入shape相同
    dtype:
    - float16
    - float32
    - bfloat16
  schema: softmax(Tensor x, int dim) -> Tensor y
