operator:
  name: Pad
  category: LayoutTransform
  difficulty: L3
  formula: y = pad(x, paddings)
  description: 对输入tensor做填充
  shape_support: 输入任意维度
  attrs:
  - name: paddings
    type: INT64[]
    description: 填充配置，按从后往前的顺序指定每维的(left, right)，如4D输入为(left, right, top, bottom)，5D输入为(left,
      right, top, bottom, front, back)
    required: true
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - int8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
    - bool
  outputs:
  - name: y
    description: 输出张量，填充后的结果
    dtype:
    - int8
    - int32
    - int64
    - float16
    - float32
    - bfloat16
    - bool
  schema: pad(Tensor x, int[] paddings) -> Tensor y
