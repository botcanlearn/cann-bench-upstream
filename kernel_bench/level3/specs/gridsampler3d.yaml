operator:
  name: GridSampler3D
  category: FusedComposite
  difficulty: L3
  formula: y = grid_sample(x, grid)
  description: 根据 grid 中坐标信息填充输出
  shape_support: 输入 5D (N, C, D, H, W)
  attrs:
  - name: interpolation_mode
    type: string
    default: bilinear
    description: '插值模式 (''bilinear'': 双线性，''nearest'': 最近邻，''bicubic'': 双三次)'
    required: false
  - name: padding_mode
    type: string
    default: zeros
    description: '填充模式 (''zeros'': 零填充，''border'': 边界填充，''reflection'': 反射填充)'
    required: false
  - name: align_corners
    type: BOOL
    default: "false"
    description: 是否对齐角点
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
  - name: grid
    description: 采样网格，形状为 (N, D, H, W, 3)
    dtype:
    - float16
    - float32
  outputs:
  - name: y
    description: 输出张量，采样结果
    dtype:
    - float16
    - float32
  schema: grid_sampler_3d(Tensor x, Tensor grid, str interpolation_mode="bilinear", str padding_mode="zeros", bool align_corners=false) -> Tensor y
