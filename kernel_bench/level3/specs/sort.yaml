operator:
  name: Sort
  category: SortSelect
  difficulty: L3
  formula: y = sort(x, dim, descending)
  description: 对输入张量进行排序
  shape_support: 输入1-8维
  attrs:
  - name: stable
    type: bool
    default: false
    description: 是否稳定排序 (相等元素的原始相对顺序保持不变)
    required: false
  - name: dim
    type: int64
    description: '排序维度 (取值范围: -ndim ~ ndim-1)'
    required: true
  - name: descending
    type: bool
    default: false
    description: 是否降序排序
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - bfloat16
    - float16
    - float32
    - int8
    - int32
    - int64
    - bool
  outputs:
  - name: y
    description: 输出张量，排序结果
    dtype:
    - bfloat16
    - float16
    - float32
    - int8
    - int32
    - int64
    - bool
  schema: sort(Tensor x, bool stable, int dim, bool descending) -> Tensor y
