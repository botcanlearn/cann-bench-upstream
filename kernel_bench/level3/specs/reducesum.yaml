operator:
  name: ReduceSum
  category: Reduction
  difficulty: L3
  formula: y = sum(x, axis=axes, keepdims=keep_dims)
  description: 返回给定维度中输入张量每行的和
  shape_support: 输入支持0-8维
  attrs:
  - name: axes
    type: int64[]
    description: 归约的维度
    required: true
  - name: keep_dims
    type: bool
    default_value: false
    description: 是否保持维度
    required: false
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - int32
    - int64
    - bfloat16
  outputs:
  - name: y
    description: 输出张量，求和结果
    dtype:
    - float16
    - float32
    - int32
    - int64
    - bfloat16
  schema: reduce_sum(Tensor x, int[] axes, bool keep_dims) -> Tensor y
