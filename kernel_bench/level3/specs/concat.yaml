operator:
  name: Concat
  category: LayoutTransform
  difficulty: L3
  formula: y = Concat(x[0], ..., x[N-1], axis)
  description: 沿指定维度将多个输入 Tensor 进行拼接
  shape_support: 多个 Tensor 输入
  attrs:
  - name: concat_dim
    type: int64
    description: '拼接维度，指定沿哪个维度拼接输入张量 (取值范围：-ndim ~ ndim-1)'
    required: true
  inputs:
  - name: x
    description: 输入张量列表 (TensorList)
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
    - bool
    is_list: true
  outputs:
  - name: y
    description: 输出张量，拼接结果
    dtype:
    - float16
    - float32
    - bfloat16
    - int8
    - int32
    - int64
    - bool
  schema: concat(Tensor[] x, int concat_dim) -> Tensor y
