operator:
  name: GQA
  category: FusedComposite
  difficulty: L4
  formula: |
    扩展 KV heads 匹配 Q heads（每个 KV head 重复 N_q/N_kv 次）
    y = softmax(Q @ K_expanded^T * scaleValue) @ V_expanded
  description: 分组查询注意力 (Grouped Query Attention)，多个 query head 共享一组 KV head，对已分头的 Q/K/V 执行注意力计算
  shape_support: "query [B, S, N_q, D]，key/value [B, S_kv, N_kv, D]，N_q 整除 N_kv"
  attrs:
  - name: scaleValue
    type: float
    default: -1.0
    description: 缩放因子，<=0 时自动使用 1/sqrt(D)
    required: false
  inputs:
  - name: query
    description: 查询张量（已分头），N_q 个 query head
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "[B, S, N_q, D]"
  - name: key
    description: 键张量（已分头），N_kv 个 KV head
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "[B, S_kv, N_kv, D]"
  - name: value
    description: 值张量（已分头），N_kv 个 KV head
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "[B, S_kv, N_kv, D]"
  outputs:
  - name: y
    description: 注意力输出张量
    dtype:
    - float16
    - float32
    - bfloat16
    shape: "[B, S, N_q, D]"
  schema: gqa(Tensor query, Tensor key, Tensor value, float scaleValue=-1.0) -> Tensor y
