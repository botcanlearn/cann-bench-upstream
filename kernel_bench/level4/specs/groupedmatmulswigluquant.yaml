# TODO 不需要这些Attr，shape信息也需要再确认下
operator:
  name: GroupedMatmulSwigluQuant
  category: FusedComposite
  difficulty: L4
  formula: y = SwiGLU(Dequant(Matmul(x, weight)))
  description: 分组矩阵乘法与SwiGLU及量化的融合
  shape_support: 'x: [M, K], weight: [E, N/32, K/16, 16, 32]'
  attrs:
  - name: dequantMode
    type: int
    description: 反量化模式
    required: true
  - name: isEnableWeightAssistanceMatrix
    type: bool
    default: false
    description: 是否启用权重辅助矩阵
    required: false
  inputs:
  - name: x
    description: 输入矩阵
    dtype:
    - int8
  - name: weight
    description: 权重矩阵
    dtype:
    - int8
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - int8
  schema: grouped_matmul_swiglu_quant(Tensor x, Tensor weight, int dequantMode, bool
    isEnableWeightAssistanceMatrix) -> Tensor y
