# TODO 支持的数据类型再确认
operator:
  name: QuantBatchMatmul
  category: Contraction
  difficulty: L4
  formula: y = dequant(x1 @ x2 * scale) + bias
  description: 量化批量矩阵乘法算子
  shape_support: 'x1: [B, M, K], x2: [B, K, N]'
  attrs:
  - name: dtype
    type: int
    description: 量化数据类型
    required: true
  - name: transpose_x1
    type: bool
    default: false
    description: 是否转置x1
    required: false
  - name: transpose_x2
    type: bool
    default: false
    description: 是否转置x2
    required: false
  inputs:
  - name: x1
    description: 第1个输入矩阵
    dtype:
    - int8
    - int4
    - float8
    - float16
    - bfloat16
  - name: x2
    description: 第2个输入矩阵
    dtype:
    - int8
    - int4
    - float8
    - float16
    - bfloat16
  - name: scale
    description: 量化缩放因子
    dtype:
    - int8
    - int4
    - float8
    - float16
    - bfloat16
  - name: bias
    description: 偏置张量
    dtype:
    - int8
    - int4
    - float8
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - int8
    - int4
    - float8
    - float16
    - bfloat16
  schema: quant_batch_matmul(Tensor x1, Tensor x2, Tensor scale, Tensor bias, int
    dtype, bool transpose_x1, bool transpose_x2) -> Tensor y
