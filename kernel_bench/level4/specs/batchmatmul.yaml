operator:
  name: BatchMatMul
  category: Contraction
  difficulty: L4
  formula: y = x1 @ x2 + bias
  description: 批量矩阵乘法算子
  shape_support: 'x1: [B, M, K], x2: [B, K, N], y: [B, M, N]'
  attrs:
  - name: adj_x1
    type: bool
    default: false
    description: 是否转置x1 (true表示对x1进行转置操作,将[B,M,K]变为[B,K,M])
    required: false
  - name: adj_x2
    type: bool
    default: false
    description: 是否转置x2 (true表示对x2进行转置操作,将[B,K,N]变为[B,N,K])
    required: false
  inputs:
  - name: x1
    description: 第1个输入矩阵
    dtype:
    - float16
    - float32
    - bfloat16
  - name: x2
    description: 第2个输入矩阵
    dtype:
    - float16
    - float32
    - bfloat16
  - name: bias
    description: 偏置张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - float16
    - float32
    - bfloat16
  schema: batch_mat_mul(Tensor x1, Tensor x2, Tensor bias, bool adj_x1, bool adj_x2)
    -> Tensor y
