operator:
  name: Gemm
  category: Contraction
  difficulty: L4
  formula: y = alpha * op(a) @ op(b) + beta * c
  description: 通用矩阵乘法算子
  shape_support: 'a: [M, K], b: [K, N], y: [M, N]'
  attrs:
  - name: alpha
    type: float
    default: 1.0
    description: alpha系数,用于缩放op(a) @ op(b)的结果
    required: false
  - name: beta
    type: float
    default: 1.0
    description: beta系数,用于缩放输入c的值
    required: false
  - name: transpose_a
    type: bool
    default: false
    description: 是否转置a
    required: false
  - name: transpose_b
    type: bool
    default: false
    description: 是否转置b
    required: false
  inputs:
  - name: a
    description: 第1个输入矩阵
    dtype:
    - float16
    - bfloat16
  - name: b
    description: 第2个输入矩阵
    dtype:
    - float16
    - bfloat16
  - name: c
    description: 第3个输入矩阵
    dtype:
    - float16
    - bfloat16
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - float16
    - bfloat16
  schema: gemm(Tensor a, Tensor b, Tensor c, float alpha, float beta, bool transpose_a,
    bool transpose_b) -> Tensor y
