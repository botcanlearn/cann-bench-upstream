# TODO 使用IncreFlashAttention，再对其原型信息定义
operator:
  name: IFA
  category: FusedComposite
  difficulty: L4
  formula: y = Attention(Q,K,V) = Softmax(QK^T / sqrt(d)) @ V
  description: 自回归语言模型的增量推理算子
  shape_support: 'B: <=65536, N: <=256, D: <=512'
  attrs:
  - name: numHeads
    type: INT64
    description: 注意力头数
    required: true
  - name: scaleValue
    type: DOUBLE
    description: 缩放因子
    required: true
  - name: inputLayout
    type: CHAR*
    description: 输入布局
    required: true
  inputs:
  - name: query
    description: 查询张量
    dtype:
    - float32
    - float16
    - int8
  - name: key
    description: 键张量
    dtype:
    - float32
    - float16
    - int8
  - name: value
    description: 值张量
    dtype:
    - float32
    - float16
    - int8
  outputs:
  - name: y
    description: 输出张量
    dtype:
    - float32
    - float16
    - int8
  schema: ifa(Tensor query, Tensor key, Tensor value, int numHeads, float scaleValue,
    str inputLayout) -> Tensor y
