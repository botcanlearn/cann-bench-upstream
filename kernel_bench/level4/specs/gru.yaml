operator:
  name: GRU
  category: FusedComposite
  difficulty: L4
  formula: |
    z_t = σ(W_z @ x_t + U_z @ h_{t-1} + b_z)
    r_t = σ(W_r @ x_t + U_r @ h_{t-1} + b_r)
    n_t = tanh(W_n @ x_t + r_t ⊙ (U_n @ h_{t-1} + b_n))
    h_t = (1 - z_t) ⊙ n_t + z_t ⊙ h_{t-1}
  description: Gated Recurrent Unit 循环神经网络
  shape_support: 'x: (S, B, input_size), h0: (num_layers * num_directions, B, hidden_size)'
  attrs:
  - name: inputSize
    type: int
    description: 输入特征维度
    required: true
  - name: hiddenSize
    type: int
    description: 隐藏状态特征维度
    required: true
  - name: numLayers
    type: int
    default: 1
    description: 循环层数
    required: false
  - name: bias
    type: bool
    default: true
    description: 是否使用偏置
    required: false
  - name: batchFirst
    type: bool
    default: false
    description: 输入是否为 (batch, seq, feature) 格式
    required: false
  - name: dropout
    type: float
    default: 0.0
    description: Dropout 概率
    required: false
  - name: bidirectional
    type: bool
    default: false
    description: 是否双向 GRU
    required: false
  inputs:
  - name: x
    description: 输入序列张量
    dtype:
    - float32
    - float16
    - bfloat16
  - name: h0
    description: 初始隐藏状态 (可选，默认全 0)
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: weight_ih
    description: 输入到隐藏层权重 (num_layers * 3 * hiddenSize, inputSize)
    dtype:
    - float32
    - float16
    - bfloat16
  - name: weight_hh
    description: 隐藏层到隐藏层权重 (num_layers * 3 * hiddenSize, hiddenSize)
    dtype:
    - float32
    - float16
    - bfloat16
  - name: bias_ih
    description: 输入到隐藏层偏置 (可选)
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  - name: bias_hh
    description: 隐藏层到隐藏层偏置 (可选)
    dtype:
    - float32
    - float16
    - bfloat16
    optional: true
  outputs:
  - name: y
    description: 输出序列 (S, B, num_directions * hiddenSize) 或 (B, S, num_directions * hiddenSize)
    dtype:
    - float32
    - float16
    - bfloat16
  - name: hn
    description: 最终隐藏状态 (num_layers * num_directions, B, hiddenSize)
    dtype:
    - float32
    - float16
    - bfloat16
  schema: gru(Tensor x, Tensor weight_ih, Tensor weight_hh, Tensor? bias_ih, Tensor? bias_hh, Tensor? h0, int inputSize, int hiddenSize, int numLayers, bool bias, bool batchFirst, float dropout, bool bidirectional) -> (Tensor y, Tensor hn)
