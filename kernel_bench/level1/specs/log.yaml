operator:
  name: Log
  category: Elementwise
  difficulty: L1
  formula: y = ln(x * scale + shift) / ln(base)
  description: 对输入张量进行对数计算，支持自定义底数、缩放和偏移
  shape_support: 输入任意维度，输出与输入相同shape
  attrs:
  - name: base
    type: float
    default: -1.0
    description: 对数的底数，-1.0表示使用自然底数e，正值表示自定义底数
  - name: scale
    type: float
    default: 1.0
    description: 输入缩放因子
  - name: shift
    type: float
    default: 0.0
    description: 输入偏移量
  note: 当base=-1时，公式简化为 y = ln(x * scale + shift)
  inputs:
  - name: x
    description: 输入张量
    dtype:
    - float16
    - float32
    - bfloat16
  outputs:
  - name: y
    description: 对数计算结果
    dtype:
    - float16
    - float32
    - bfloat16
  schema: log(Tensor x, float base, float scale, float shift) -> Tensor y
