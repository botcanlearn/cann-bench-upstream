operator:
  name: ForeachNorm
  category: Reduction
  difficulty: L1
  formula: y = (sum |x_i|^p)^(1/p)
  description: 对输入张量列表的每个张量进行范数运算
  shape_support: 输入 ND 格式
  attrs:
  - name: scalar
    type: float
    description: 范数阶数
    required: true
  inputs:
  - name: x
    description: 输入张量列表 (TensorList)
    dtype:
    - float32
    - float16
    - bfloat16
    is_list: true
  outputs:
  - name: y
    description: 输出张量，范数结果
    dtype:
    - float32
    - float16
    - bfloat16
  schema: foreach_norm(Tensor[] x, float scalar) -> Tensor y
