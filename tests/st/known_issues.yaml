# (op, case|all) → {reason, action[, target]} for the golden-candidate ST.
#   action ∈ {skip-hang, xfail-accuracy, xfail-perf, skip}
#   case   ∈ <int> (一个用例) | "all" (op 级,整算子)
#   target ∈ {golden, baseline} | 省略 (对所有都生效). 本 ST 只跑 golden 候选, baseline 预留。
#
# 据 NPU 实机首跑 golden ST 回填(后续按实际 accuracy-fail / 无可测 kernel 的算子补充)。

# StridedSlice:golden 已 clone 物化(见 tasks/level3/strided_slice/golden.py),非连续切片能跑出
# 真实 SliceAiCore kernel(17/20 可计量)。但 case 14/18/19 是 shrink+小输出,物化走 DMA memcpy
# (非 AiCore)→ AiCore-only 的 KernelDetailsStrategy 采不到,perf 结构性为 0(非 flaky)。仅对
# 这 3 个 case 放宽 perf,其余 17 个仍正常计量。
- {op: StridedSlice, case: 14, action: xfail-perf, target: golden, reason: "shrink+小输出,物化走 DMA(非 AiCore),profiler 采不到"}
- {op: StridedSlice, case: 18, action: xfail-perf, target: golden, reason: "shrink+小输出,物化走 DMA(非 AiCore),profiler 采不到"}
- {op: StridedSlice, case: 19, action: xfail-perf, target: golden, reason: "shrink+小输出,物化走 DMA(非 AiCore),profiler 采不到"}

# GRU:NPU 的 DynamicGRUV2 算子只支持 fp16(weight 需 DT_FLOAT16)。fp32(case 1/4)与
# bfloat16(case 3/9/13/17)在 NPU 上 Unsupported_Operator(EZ3002)直接崩,无法作为候选评测
# (任何真实 npu_gru 候选同样跑不了)。golden 本身正确(14 个 fp16 case q7 实测误差 ~5e-4 ≪ 0.05)。
# 故 skip 这 6 个 fp32/bf16 case;14 个 fp16 case 正常计量。
- {op: GRU, case: 1, action: skip-hang, target: golden, reason: "fp32:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}
- {op: GRU, case: 4, action: skip-hang, target: golden, reason: "fp32:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}
- {op: GRU, case: 3, action: skip-hang, target: golden, reason: "bf16:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}
- {op: GRU, case: 9, action: skip-hang, target: golden, reason: "bf16:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}
- {op: GRU, case: 13, action: skip-hang, target: golden, reason: "bf16:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}
- {op: GRU, case: 17, action: skip-hang, target: golden, reason: "bf16:NPU DynamicGRUV2 仅支持 fp16,EZ3002 不支持"}

# LSTM case 19/20:投影 LSTM(projSize>0 / LSTMP)。torch_npu 的 nn.LSTM 投影在 NPU 上崩
# (case19 L=1 → DynamicRNN inner error;case20 L=2 → aclnnCat 161002),而改手写 matmul 递推
# 又被反作弊 TorchOpGuard 拦(禁 torch.matmul)→ 投影无法作为 guarded 候选在 NPU 评测。golden
# (CPU 参考)已用 nn.LSTM + 传入 weight_hr 正确且确定(供真实评测),仅 ST 候选侧跳过这两个 case。
# (注:旧 torch_npu 上 L=1 投影曾能跑,现已同样崩 → 两个都需 skip。)
- {op: LSTM, case: 19, action: skip-hang, target: golden, reason: "LSTMP L=1:torch_npu 投影 NPU 崩(DynamicRNN inner error)+ 手写 matmul 被 guard 拦,无法作为候选评测"}
- {op: LSTM, case: 20, action: skip-hang, target: golden, reason: "LSTMP L=2:torch_npu 投影 NPU aclnnCat 崩(161002)+ 手写被 guard 拦"}
